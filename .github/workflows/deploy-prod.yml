name: Deploy Rules to Elastic PROD

on:
  push:
    branches:
      - main
    paths:
      - 'rules/prod/**/*.yml'

jobs:
  deploy:
    name: Deploy to Elastic PROD
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Python available
        run: python3 --version

      - name: Create virtual environment
        run: python3 -m venv /tmp/dac-venv

      - name: Install dependencies
        run: /tmp/dac-venv/bin/pip install pyyaml requests --quiet

      - name: Deploy rules to Elastic
        env:
          ELASTIC_PROD_URL:     ${{ secrets.ELASTIC_PROD_URL }}
          ELASTIC_PROD_API_KEY: ${{ secrets.ELASTIC_PROD_API_KEY }}
        run: /tmp/dac-venv/bin/python3 tools/deploy_rules.py

      - name: Clean up
        if: always()
        run: rm -rf /tmp/dac-venv

      - name: Write deployment summary
        run: |
          echo "## Elastic DaC Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Rule | Folder | Enabled |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          for f in $(find rules/prod \
            -name "*.yml" ! -name ".gitkeep" | sort); do
            N=$(grep '^name:' "$f" | head -1 \
              | sed 's/name: //' | tr -d '"')
            FOLDER=$(echo "$f" | grep -o "enabled\|disabled")
            EN=$([ "$FOLDER" = "enabled" ] \
              && echo "true" || echo "false")
            echo "| $N | $FOLDER | $EN |" >> $GITHUB_STEP_SUMMARY
          done
