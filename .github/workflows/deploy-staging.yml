name: Deploy Rules to Elastic STAGING

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Deploy from: staging or prod"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy-staging:
    name: Deploy to Elastic STAGING
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Python available
        run: python3 --version

      - name: Create virtual environment
        run: python3 -m venv /tmp/dac-staging-venv

      - name: Install dependencies
        run: /tmp/dac-staging-venv/bin/pip install pyyaml requests --quiet

      - name: Deploy to Staging
        env:
          ELASTIC_STAGING_URL:     ${{ secrets.ELASTIC_STAGING_URL }}
          ELASTIC_STAGING_API_KEY: ${{ secrets.ELASTIC_STAGING_API_KEY }}
          DEPLOY_FOLDER: ${{ inputs.folder }}
        run: /tmp/dac-staging-venv/bin/python3 tools/deploy_rules.py

      - name: Clean up
        if: always()
        run: rm -rf /tmp/dac-staging-venv
