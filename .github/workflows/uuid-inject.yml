name: Inject UUID into Rules Missing rule_id

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'rules/staging/*.yml'

permissions:
  contents: write

jobs:
  inject-uuid:
    name: Auto-fill missing rule_id fields
    runs-on: ubuntu-latest

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml --quiet

      - name: Inject UUIDs
        run: python3 tools/inject_uuid.py

      - name: Commit injected UUIDs
        run: |
          git config user.name  "elastic-dac-pipeline[bot]"
          git config user.email "elastic-dac-pipeline[bot]@users.noreply.github.com"
          git diff --quiet && echo "Nothing to commit" && exit 0
          git add rules/staging/*.yml
          FILES=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "chore: auto-inject UUID for $FILES"
          git push
