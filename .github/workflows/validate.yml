name: Validate Detection Rules

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Rules in staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml jsonschema --quiet

      - name: Block direct prod edits
        run: python3 tests/test_no_prod_edits.py

      - name: Check YAML syntax
        run: python3 tests/test_yaml_syntax.py

      - name: Check rule_id is valid UUID
        run: python3 tests/test_rule_id.py

      - name: Validate against schema
        run: python3 tests/test_schema.py

      - name: Check severity and risk_score
        run: python3 tests/test_severity_risk.py

      - name: Check no duplicate rule_ids
        run: python3 tests/test_no_duplicates.py
