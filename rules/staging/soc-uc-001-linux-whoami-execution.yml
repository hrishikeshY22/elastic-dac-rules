schema_version: 1

rule_id: "e95dc932-a8bd-49c9-a21d-d2a5db7334a6"

metadata:
  creation_date: "2026/07/16"
  updated_date: "2026/07/15"
  maturity: "production"
  author:
    - "HRISHIKESH YALAVARTHI - DaC Lab2.0"

name: "SOC-UC-001-Linux-Whoami Execution Detected"

description: |
  Detects execution of the whoami command on Linux systems.
  Attackers commonly run whoami after gaining initial access
  to identify current user context and privilege level.
  This is a common post-exploitation reconnaissance technique.

enabled: true

type: esql
language: esql

severity: "low"
risk_score: 21

tags:
  - "Linux"
  - "Discovery"
  - "T1033"

index:
  - "logs-endpoint.events.*"

query: |
  FROM logs-endpoint.events.*
  | WHERE event.action == "test"
    AND process.name == "whoami"
  | KEEP @timestamp, host.name, user.name,
         process.name, process.command_line

interval: "5m"
from: "now-10m"
to: "now"

timestamp_override: "event.ingested"

threat:
  - framework: "MITRE ATT&CK"
    tactic:
      id: "TA0007"
      name: "Discovery"
      reference: "https://attack.mitre.org/tactics/TA0007/"
    technique:
      - id: "T1033"
        name: "System Owner/User Discovery"
        reference: "https://attack.mitre.org/techniques/T1033/"
        subtechnique: []

investigation_fields:
  field_names:
    - "host.name"
    - "user.name"
    - "process.command_line"

note: |
  ## Triage and Analysis
  ### What triggered this alert
  The whoami command was executed on a Linux host.
  ### What to investigate
  - Who ran the command and is it expected?
  - Was this preceded by suspicious login activity?
  ### False positive guidance
  - Legitimate admin activity — verify with system owner

false_positives:
  - "System administrators running diagnostic commands"

references:
  - "https://attack.mitre.org/techniques/T1033/"

max_signals: 100
actions: []

note: |
  ## Triage and Analysis

  ### What triggered this alert
  The whoami command was executed on a Linux host.

  ### What to investigate
  - Who ran the command and from which parent process?
  - Was this preceded by any suspicious login activity?
  - Is the user account expected to be active on this host?

  ### False positive guidance
  - System administrators running diagnostic commands
  - Automated scripts using whoami for environment checks

  ### Response steps
  - Verify with the system owner if this activity was expected
  - Check for other suspicious commands executed by same user
